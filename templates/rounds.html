<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Rounds</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body {
    background: url('{{ url_for('static', filename='chessboard.jpg') }}') no-repeat center center fixed;
    background-size: cover;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1200px;
    background: white;
    border-radius: 15px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
.round-card {
    background: #f8f9fa;
    border-left: 5px solid #667eea;
    margin-bottom: 20px;
}
.round-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    font-weight: bold;
}
.match-row:hover {
    background-color: #e9ecef;
}
.bye-alert {
    background: #fff3cd;
    border-left: 4px solid #ffc107;
}
.btn-generate {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none;
    color: white;
    padding: 12px 30px;
    font-weight: bold;
}
.btn-generate:hover {
    opacity: 0.9;
    color: white;
}
</style>
</head>
<body>

<div class="container">
    <h1 class="mb-4 text-center" style="color: #000000;">Tournament Rounds Manager</h1>
    <!-- ADD THIS DIV FOR STANDINGS DISPLAY -->
    <div id="tournamentListBox"></div>

    <!-- Alert Messages -->
    {% if error_message %}
    <div class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong>Error!</strong> {{ error_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    
    {% if success_message %}
    <div class="alert alert-success alert-dismissible fade show" role="alert">
        <strong>Success!</strong> {{ success_message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endif %}
    
    <!-- Tournament Selection -->
    <form method="POST" class="mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-8">
                <label class="form-label fw-bold">Select Tournament:</label>
                <select name="tournament_id" required class="form-select" id="tournamentSelect">
                    <option value="">-- Choose a Tournament --</option>
                    {% for t in tournaments %}
                    <option value="{{ t.id }}" data-name="{{ t.name }}" {% if selected_tournament and t.id == selected_tournament.id %}selected{% endif %}>
                        {{ t.name }} ({{ t.rounds }} rounds)
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4 d-flex gap-3">
                <button type="submit" name="action" value="load_tournament" class="btn btn-primary w-80">
                    Load Rounds
                </button>
                <a href="{{ url_for('setupdashboard') }}" class="btn btn-primary w-80">Back</a>
                <button type = "button" class="btn btn-primary w-80" onclick="showStandingsSelector()">Standings</button>
            </div>
        </div>
    </form>

    {% if selected_tournament %}
    <div id="roundsContainer"></div>
    {% endif %}

</div> <!-- Closes main container -->


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>

function showStandingsSelector() {
    const tournamentSelect = document.getElementById('tournamentSelect');
    const selectedOption = tournamentSelect ? tournamentSelect.options[tournamentSelect.selectedIndex] : null;

    if (selectedOption && selectedOption.value) {
        const tournamentName = selectedOption.getAttribute('data-name');
        const tournamentId = selectedOption.value;

        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Clear previous standings
        document.getElementById("tournamentListBox").innerHTML = '';

        // IMPORTANT: roundsContainer may not exist yet
        const roundsContainer = document.getElementById("roundsContainer");
        if (roundsContainer) {
            roundsContainer.innerHTML =
                '<div class="text-center"><div class="spinner-border text-primary" role="status"></div><p>Loading rounds...</p></div>';
        }

        // Always load standings
        loadStandings(tournamentName);

        // Load rounds only if container exists (or you want to fetch anyway)
        if (roundsContainer) {
            loadRounds(tournamentId, tournamentName);
        }

    } else {
        alert("Please select a tournament first!");
    }
}

function loadStandings(tname) {
    let box = document.getElementById("tournamentListBox");
    box.innerHTML = '<div class="text-center"><div class="spinner-border text-primary" role="status"></div><p>Loading standings...</p></div>';
    
    fetch(`/api/tournament/${encodeURIComponent(tname)}/standings`)
    .then(async response => {
    if (!response.ok) throw new Error(await response.text());
    return response.json();
})

    .then(data => {
        if (data.error) {
            alert(data.error);
            box.innerHTML = '';
            return;
        }

        let html = `
        <div class="card bg-dark text-white mt-4 mb-4 p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4>${data.tournament} - Standings</h4>
                <div>
                    <button class="btn btn-sm btn-secondary" onclick="hideStandings()">
                        Close Standings
                    </button>
                    <button class="btn btn-sm btn-danger ms-2" onclick="exportToExcel('${data.tournament}')">
                        Export 
                    </button>
                    <span class="badge bg-info fs-6 ms-2">Round ${data.current_round} of ${data.total_rounds}</span>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;">
                        <tr>
                            <th>#</th>
                            <th>Name</th>
                            <th>ELO</th>
                            <th>Score</th>
                            
                            <th>TB1 (H2H)</th>
                            <th>TB2 (Buch)</th>
                            <th>TB3 (BuchCut1)</th>
                            <th>TB4 (SB)</th>
                            <th>TB5 (Wins)</th>
                            <th>TB6 (Wins as Black)</th>

                            <th>Games</th>
                            <th>W/B</th>
                        </tr>
                    </thead>
                    <tbody>`;

        data.standings.forEach(player => {
            const rowStyle = player.bye_count > 0 ? 'background-color: #fff3cd;' : '';
            
            html += `
                <tr style="${rowStyle}">
                    <td><strong>${player.rank}</strong></td>
                    <td>${player.name}</td>
                    <td>${player.elo}</td>
                    <td><strong style="color: #667eea;">${player.score}</strong></td>
                    <td>${player.tb1_direct == null ? "" : player.tb1_direct}</td>
                    <td>${player.buchholz.toFixed(1)}</td>
                    <td>${player.buchholz_cut1.toFixed(1)}</td>
                    <td>${player.sb.toFixed(2)}</td>
                    <td>${player.wins}</td>
                    <td>${player.wins_black}</td>

                    <td>${player.games_played}</td>
                    <td>${player.white_count}/${player.black_count}</td>
                </tr>`;
        });

        html += `
                    </tbody>
                </table>
            </div>
        </div>`;

        box.innerHTML = html;
    })
    .catch(err => {
        console.error("Error loading standings:", err);
        alert("Failed to load standings");
        box.innerHTML = '';
    });
}

function loadRounds(tournamentId, tournamentName) {
    let container = document.getElementById("roundsContainer");

    Promise.all([
        fetch(`/api/tournament/${tournamentId}/rounds`),
        fetch(`/api/tournaments`)
    ])
    .then(([roundsResponse, tournamentsResponse]) =>
        Promise.all([roundsResponse.json(), tournamentsResponse.json()])
    )
    .then(([roundsData, tournamentsData]) => {
        if (roundsData.status !== 'ok' || !roundsData.rounds) {
            alert('Failed to load rounds');
            container.innerHTML = '<div class="alert alert-danger">Failed to load rounds</div>';
            return;
        }

        const tournament = tournamentsData.tournaments.find(t => t.id == tournamentId);
        const totalRounds = tournament ? tournament.rounds : 0;

        let html = '';

        if (roundsData.rounds.length > 0) {
            roundsData.rounds.forEach(round => {
                html += `
                <div class="card round-card">
                    <div class="card-header round-header">
                        <h4 class="mb-0">Round ${round.round_number}</h4>
                    </div>
                    <div class="card-body">`;

                if (round.bye_player) {
                    html += `
                        <div class="alert bye-alert">
                            <strong>🏆 Bye Player:</strong> ${round.bye_player}
                        </div>`;
                }

                html += `
                    <form method="POST">
                        <input type="hidden" name="tournament_id" value="${tournamentId}">
                        <input type="hidden" name="round_number" value="${round.round_number}">
                        <input type="hidden" name="action" value="save_results">

                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th style="width: 35%;">White Player</th>
                                    <th style="width: 35%;">Black Player</th>
                                    <th style="width: 30%;">Result</th>
                                </tr>
                            </thead>
                            <tbody>`;

                round.pairings.forEach(pairing => {
                    const resultKey = `${pairing.white_id}-${pairing.black_id}`;
                    const result = round.results ? round.results[resultKey] : null;

                    html += `
                        <tr class="match-row">
                            <td>${pairing.white_name}</td>
                            <td>${pairing.black_name}</td>
                            <td>`;

                    if (result) {
                        let resultText = '';
                        let badgeClass = 'bg-success';

                        if (result === 'white') resultText = '✓ White Won';
                        else if (result === 'black') resultText = '✓ Black Won';
                        else if (result === 'draw') resultText = '⚖ Draw';
                        else if (result === 'bye_white') { resultText = '✓ Bye (White)'; badgeClass = 'bg-warning'; }
                        else if (result === 'bye_black') { resultText = '✓ Bye (Black)'; badgeClass = 'bg-warning'; }

                        html += `<span class="badge ${badgeClass} fs-6">${resultText}</span>`;
                    } else {
                        html += `
                            <div class="btn-group" role="group">
                                <input type="radio" class="btn-check" name="winner_${pairing.white_id}-${pairing.black_id}"
                                    value="bye_white" id="byew${pairing.white_id}-${pairing.black_id}">
                                <label class="btn btn-outline-warning btn-sm" for="byew${pairing.white_id}-${pairing.black_id}">Bye (W)</label>

                                <input type="radio" class="btn-check" name="winner_${pairing.white_id}-${pairing.black_id}"
                                    value="white" id="w${pairing.white_id}-${pairing.black_id}" required>
                                <label class="btn btn-outline-success btn-sm" for="w${pairing.white_id}-${pairing.black_id}">White</label>

                                <input type="radio" class="btn-check" name="winner_${pairing.white_id}-${pairing.black_id}"
                                    value="draw" id="d${pairing.white_id}-${pairing.black_id}">
                                <label class="btn btn-outline-secondary btn-sm" for="d${pairing.white_id}-${pairing.black_id}">Draw</label>

                                <input type="radio" class="btn-check" name="winner_${pairing.white_id}-${pairing.black_id}"
                                    value="black" id="b${pairing.white_id}-${pairing.black_id}">
                                <label class="btn btn-outline-danger btn-sm" for="b${pairing.white_id}-${pairing.black_id}">Black</label>

                                <input type="radio" class="btn-check" name="winner_${pairing.white_id}-${pairing.black_id}"
                                    value="bye_black" id="byeb${pairing.white_id}-${pairing.black_id}">
                                <label class="btn btn-outline-warning btn-sm" for="byeb${pairing.white_id}-${pairing.black_id}">Bye (B)</label>
                            </div>`;
                    }

                    html += `
                            </td>
                        </tr>`;
                });

                // Show Save button only if at least one pairing is pending
                const hasPending = round.pairings.some(p => {
                    const key = `${p.white_id}-${p.black_id}`;
                    return !(round.results && round.results[key]);
                });

                html += `
                            </tbody>
                        </table>

                        ${hasPending ? `<button type="submit" class="btn btn-success">Save Round ${round.round_number} Results</button>` : ``}
                    </form>
                    </div>
                </div>`;
            });
        } else {
            html = '<div class="alert alert-info">No rounds generated yet.</div>';
        }

        // Generate next round button
        if (roundsData.rounds.length < totalRounds) {
            html += `
                <div class="text-center mt-4">
                    <form method="POST">
                        <input type="hidden" name="tournament_id" value="${tournamentId}">
                        <input type="hidden" name="action" value="generate_next_round">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Generate Round ${roundsData.rounds.length + 1}
                        </button>
                    </form>
                </div>`;
        } else if (roundsData.rounds.length === totalRounds) {
            html += `
                <div class="alert alert-success text-center mt-4">
                    <h4>🏁 Tournament Complete!</h4>
                    <p>All ${totalRounds} rounds have been played.</p>
                </div>`;
        }

        container.innerHTML = html;
    })
    .catch(err => {
        console.error("Error loading rounds:", err);
        alert("Failed to load rounds");
        container.innerHTML = '<div class="alert alert-danger">Error loading rounds</div>';
    });
}

function hideStandings() {
    document.getElementById("tournamentListBox").innerHTML = '';
    const alertInfo = document.querySelector('.alert.alert-info');
    if (alertInfo) {
        alertInfo.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
}

function exportToExcel(tournamentName) {
    let wb = XLSX.utils.book_new();

    // helper: safe number formatting
    const fmt = (val, digits = 1) => {
        if (val === null || val === undefined || val === "") return "";
        const num = Number(val);
        if (isNaN(num)) return "";
        return num.toFixed(digits);
    };

    fetch(`/api/tournament/${encodeURIComponent(tournamentName)}/standings`)
    .then(res => res.json())
    .then(standingsData => {

        if (!standingsData || standingsData.error) {
            alert(standingsData?.error || "Failed to load standings");
            return;
        }

        return fetch(`/api/tournaments`)
        .then(res => res.json())
        .then(allTournaments => {
            const tournament = allTournaments.tournaments.find(t => t.name === tournamentName);
            if (!tournament) throw new Error("Tournament not found in list");
            return fetch(`/api/tournament/${tournament.id}/rounds`);
        })
        .then(res => res.json())
        .then(roundsData => {

            // ======================
            // 1) STANDINGS SHEET
            // ======================
            const standingsTableData = [];
            standingsTableData.push([
                'Rank', 'Name', 'ELO', 'Score',
                'TB1 Direct', 'TB2 Buchholz', 'TB3 Buch Cut-1', 'TB4 Sonneborn-Berger',
                'TB5 Most Wins', 'TB6 Wins as Black'
            ]);

            standingsData.standings.forEach(player => {
                standingsTableData.push([
                    player.rank ?? "",
                    player.name ?? "",
                    player.elo ?? "",
                    player.score ?? "",
                    player.tb1_direct ?? "",
                    fmt(player.buchholz, 1),
                    fmt(player.buchholz_cut1, 1),
                    fmt(player.sb, 2),
                    player.wins ?? "",
                    player.wins_as_black ?? ""
                ]);
            });

            const standingsSheet = XLSX.utils.aoa_to_sheet(standingsTableData);

            standingsSheet['!cols'] = [
                { wch: 6 },   // Rank
                { wch: 22 },  // Name
                { wch: 8 },   // ELO
                { wch: 8 },   // Score
                { wch: 12 },  // TB1
                { wch: 12 },  // TB2
                { wch: 14 },  // TB3
                { wch: 18 },  // TB4
                { wch: 12 },  // TB5
                { wch: 14 }   // TB6
            ];

            XLSX.utils.book_append_sheet(wb, standingsSheet, 'Standings');

            // ======================
            // 2) ROUND SHEETS
            // ======================
            if (roundsData.rounds && roundsData.rounds.length > 0) {
                roundsData.rounds.forEach(round => {
                    const roundTableData = [];
                    roundTableData.push(['Board', 'White', 'Black', 'Result']);

                    round.pairings.forEach((pairing, idx) => {
                        let result = 'Pending';
                        if (pairing.result === 'white') result = 'White Won';
                        else if (pairing.result === 'black') result = 'Black Won';
                        else if (pairing.result === 'draw') result = 'Draw';
                        else if (pairing.result === 'bye_white') result = 'White BYE Win';
                        else if (pairing.result === 'bye_black') result = 'Black BYE Win';

                        roundTableData.push([
                            idx + 1,
                            pairing.white_name ?? "",
                            pairing.black_name ?? "",
                            result
                        ]);
                    });

                    const roundSheet = XLSX.utils.aoa_to_sheet(roundTableData);
                    roundSheet['!cols'] = [
                        { wch: 8 },   // Board
                        { wch: 25 },  // White
                        { wch: 25 },  // Black
                        { wch: 18 }   // Result
                    ];

                    XLSX.utils.book_append_sheet(wb, roundSheet, `Round ${round.round_number}`);
                });
            }

            // ======================
            // 3) EXPORT FILE
            // ======================
            const fileName = `${tournamentName}_Standings+Rounds.xlsx`;
            XLSX.writeFile(wb, fileName);
        });

    })
    .catch(err => {
        console.error("Export error:", err);
        alert("Failed to export: " + err.message);
    });
}

document.addEventListener("DOMContentLoaded", function () {
    const select = document.getElementById("tournamentSelect");
    const selectedOption = select ? select.options[select.selectedIndex] : null;

    if (selectedOption && selectedOption.value) {
        const tournamentId = selectedOption.value;
        const tournamentName = selectedOption.getAttribute("data-name");

        // Load rounds automatically
        loadRounds(tournamentId, tournamentName);
    }
});
</script>
</body>
</html>
